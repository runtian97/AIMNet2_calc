# ───────────────────────────────────────────────────────────────────────────
#  TEMPLATE 5: RK4 IRC integrator
# ───────────────────────────────────────────────────────────────────────────
#   coord_type : redund
#   cos        : neb
#   tsopt      : rsirfo
#   irc        : rk4        (Runge-Kutta 4, no predictor-corrector)
#
#   Benchmark:  26 / 30 PASS, 627 s
#
#   When to use: rare cases where eulerpc's predictor-corrector struggles
#   (unstable modes near the TS).  rk4 is simpler but slower.

reactions:
  r_xyz: /absolute/path/to/r.xyz
  p_xyz: /absolute/path/to/p.xyz

calc:
  type:  aimnet
  model: /absolute/path/to/aimnet2nse_0.jpt
  charge: -1
  mult:   1

workflow:
  preopt:
    max_cycles: 50
  interpol:
    type: redund
    between: 10
  cos:
    type: neb
  opt:
    type: lbfgs
    align: True
    rms_force: 0.01
    max_step: 0.04
  tsopt:
    type: rsirfo
    do_hess: True
    max_cycles: 100
    thresh: gau_tight
    hessian_recalc: 7
  irc:
    type: rk4
    rms_grad_thresh: 0.0005
  endopt:
    fragments: True

batch:
  workdir: runs
  slim: true          # keep products up to the last successful stage
                      # and split runs into success/ + fail/ subdirs
  max_workers: null   # null = run all reactions concurrently (may OOM if many);
                      # set to e.g. 50 to throttle (each worker ~500 MB CPU RAM)
