# ───────────────────────────────────────────────────────────────────────────
#  TEMPLATE 4: baseline (pysisyphus-default coord + neb)
# ───────────────────────────────────────────────────────────────────────────
#   coord_type : redund     (pysisyphus default)
#   cos        : neb
#   tsopt      : rsirfo
#   irc        : eulerpc
#
#   Benchmark:  27 / 30 PASS, 517 s
#
#   When to use: conservative choice.  Matches pysisyphus defaults for every
#   stage; useful as a reference when debugging an unusual reaction set.

reactions:
  r_xyz: /absolute/path/to/r.xyz
  p_xyz: /absolute/path/to/p.xyz

calc:
  type:  aimnet
  model: /absolute/path/to/aimnet2nse_0.jpt
  charge: -1
  mult:   1

workflow:
  preopt:
    max_cycles: 50
  interpol:
    type: redund
    between: 10
  cos:
    type: neb
  opt:
    type: lbfgs
    align: True
    rms_force: 0.01
    max_step: 0.04
  tsopt:
    type: rsirfo
    do_hess: True
    max_cycles: 100
    thresh: gau_tight
    hessian_recalc: 7
  irc:
    type: eulerpc
    rms_grad_thresh: 0.0005
  endopt:
    fragments: True

batch:
  workdir: runs
  slim: true          # keep products up to the last successful stage
                      # and split runs into success/ + fail/ subdirs
  max_workers: null   # null = run all reactions concurrently (may OOM if many);
                      # set to e.g. 50 to throttle (each worker ~500 MB CPU RAM)
